<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Střelecká soutěž</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&family=Barlow+Condensed:wght@400;600;700&display=swap');

  /* ── TOKENS ── */
  :root {
    --bg: #0d0f0e; --surface: #141714; --surface2: #1c1f1c;
    --border: #2a2e2a; --accent: #c8ff00; --accent2: #ff6b2b;
    --text: #e8ede8; --muted: #6b736b;
    --gold: #f5c842; --silver: #a0aaa0; --bronze: #cd7f3a;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Barlow', sans-serif; font-weight: 400;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%,  rgba(200,255,0,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(255,107,43,0.04) 0%, transparent 50%);
  }
  body.light {
    --bg: #f4f5f0; --surface: #ffffff; --surface2: #f3f4ef;
    --border: #d0d4c8; --accent: #4a7c00; --accent2: #d4500a;
    --text: #1a1e1a; --muted: #5c655c;
    --gold: #b8860b; --silver: #708070; --bronze: #9a5a20;
    background-image:
      radial-gradient(ellipse at 20% 0%,  rgba(74,124,0,0.06)  0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(212,80,10,0.04) 0%, transparent 50%);
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* Base scale — bump root font so all rem-based sizing grows proportionally.
     Tuned for tablet/notebook readability. */
  html { font-size: 118.75%; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    height: 4rem; padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.12em; color:var(--accent); }
  .logo span { color: var(--text); }
  .header-phase { font-family:'Barlow Condensed',sans-serif; font-size:.75rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .header-phase .dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; margin-right:8px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  .theme-toggle {
    display:flex; align-items:center; gap:6px;
    padding:4px 10px 4px 6px; background:none;
    border:1px solid var(--border); border-radius:20px;
    color:var(--muted); cursor:pointer; white-space:nowrap;
    font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    transition: border-color .2s, color .2s;
  }
  .theme-toggle:hover { border-color:var(--accent); color:var(--accent); }

  /* ── TABS ── */
  .nav-tabs { display:flex; overflow-x:auto; padding:0 2rem; background:var(--surface); border-bottom:1px solid var(--border); }
  .tab-btn {
    font-family:'Barlow Condensed',sans-serif; font-size:.8rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase;
    color:var(--muted); background:none; border:none; border-bottom:2px solid transparent;
    padding:.85rem 1.2rem; cursor:pointer; white-space:nowrap; transition:all .2s;
  }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-btn:disabled { opacity:.3; cursor:not-allowed; }

  /* ── LAYOUT ── */
  main { max-width:1040px; margin:0 auto; padding:2rem; }
  .section-title { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:.08em; color:var(--text); margin-bottom:.2rem; }
  .section-sub { font-size:.85rem; color:var(--muted); margin-bottom:2rem; }

  /* ── COMMON COMPONENTS ── */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:1.5rem; margin-bottom:1rem; }
  .hidden { display:none !important; }
  .flex { display:flex; }
  .gap-1 { gap:.5rem; }
  .mt-2 { margin-top:1rem; }
  .justify-between { justify-content:space-between; }
  .align-center { align-items:center; }

  /* ── INPUTS ── */
  label { display:block; font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:.4rem; }
  input[type="text"], input[type="number"] {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:3px;
    color:var(--text); font-family:'Barlow',sans-serif; font-size:.95rem;
    padding:.6rem .9rem; outline:none; transition:border-color .2s;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color:var(--accent); }
  input[type="number"] { -moz-appearance:textfield; }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; }

  /* ── BUTTONS ── */
  .btn {
    font-family:'Barlow Condensed',sans-serif; font-size:.85rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    border:none; border-radius:3px; padding:.7rem 1.8rem; cursor:pointer; transition:all .15s;
  }
  .btn-primary { background:var(--accent); color:#0d0f0e; }
  .btn-primary:hover { background:#d8ff20; transform:translateY(-1px); }
  .btn-secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--text); }
  .btn-danger { background:transparent; color:var(--accent2); border:1px solid var(--accent2); }
  .btn-danger:hover { background:var(--accent2); color:#fff; }
  .btn-sm { padding:.45rem 1rem; font-size:.75rem; }

  /* ── ALERT ── */
  .alert { display:none; padding:.8rem 1rem; border-radius:4px; font-size:.85rem; margin-bottom:1rem; }
  .alert.show { display:block; }
  .alert.error { background:rgba(255,107,43,.06); border:1px solid rgba(255,107,43,.2); color:var(--accent2); }

  /* ── SETUP ── */
  .team-count-row { display:flex; align-items:flex-end; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
  .team-count-row > div { flex:0 0 auto; }
  .teams-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
  .team-card { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:1.2rem; }
  .team-number { font-family:'Bebas Neue',sans-serif; font-size:.9rem; letter-spacing:.15em; color:var(--accent); margin-bottom:.8rem; }
  .team-fields { display:flex; flex-direction:column; gap:.6rem; }

  /* ── TOURNAMENT CARDS ── */
  .tournament-card {
    display:flex; align-items:center; gap:1rem;
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    padding:1.2rem 1.4rem; margin-bottom:.7rem;
    cursor:pointer; transition:border-color .2s;
  }
  .tournament-card:hover, .tournament-card.active-t { border-color:var(--accent); }
  .t-card-info { flex:1; min-width:0; }
  .t-card-name { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-card-meta { font-size:.75rem; color:var(--muted); margin-top:2px; }
  .t-card-status { font-family:'Barlow Condensed',sans-serif; font-size:.68rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; padding:2px 8px; border-radius:2px; white-space:nowrap; }
  .t-status-setup  { background:rgba(107,115,107,.15); color:var(--muted); }
  .t-status-active { background:rgba(200,255,0,.1);    color:var(--accent); }
  .t-status-done   { background:rgba(245,200,66,.1);   color:var(--gold); }
  .t-card-actions { display:flex; gap:.4rem; flex-shrink:0; }

  /* ── MATCHES ── */
  .match-card {
    display:grid; grid-template-columns:1fr auto 1fr; gap:1rem; align-items:center;
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    padding:1.2rem 1.5rem; margin-bottom:.6rem; transition:border-color .2s;
  }
  .match-card.active { border-color:var(--accent); }
  .match-card.done   { opacity:.7; }
  .match-team { display:flex; flex-direction:column; gap:2px; }
  .match-team.right { text-align:right; }
  .match-team-name { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:.05em; }
  .match-team-players { font-size:.75rem; color:var(--muted); }
  .match-score-area { display:flex; align-items:center; gap:.5rem; justify-content:center; }
  .score-input { width:3.6rem !important; text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.6rem !important; padding:.3rem .4rem !important; letter-spacing:.08em; }
  .score-divider { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:var(--muted); }
  .match-number { font-family:'Barlow Condensed',sans-serif; font-size:.65rem; font-weight:600; letter-spacing:.2em; color:var(--muted); text-align:center; margin-bottom:4px; text-transform:uppercase; }
  .match-submit-btn { display:block; margin:.6rem auto 0; }
  .match-result-display { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:.1em; color:var(--muted); }
  .match-result-display .winner { color:var(--accent); }

  /* ── PROGRESS ── */
  .progress-text { font-family:'Barlow Condensed',sans-serif; font-size:.75rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
  .progress-bar-wrap { background:var(--surface2); border-radius:2px; height:4px; margin-bottom:2rem; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .4s ease; }

  /* ── FILTERS ── */
  .filter-row { display:flex; gap:.6rem; margin-bottom:1.2rem; flex-wrap:wrap; }
  .filter-btn {
    font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase;
    background:var(--surface2); border:1px solid var(--border); border-radius:2px;
    color:var(--muted); padding:.4rem .9rem; cursor:pointer; transition:all .15s;
  }
  .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); }

  /* ── STANDINGS ── */
  .standings-table { width:100%; border-collapse:collapse; font-size:.9rem; min-width:max-content; }
  .standings-table th {
    font-family:'Barlow Condensed',sans-serif; font-size:.7rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); padding:.6rem 1rem; text-align:left; border-bottom:1px solid var(--border);
  }
  .standings-table th.num { text-align:right; }
  .standings-table td { padding:.75rem 1rem; border-bottom:1px solid var(--border); }
  .standings-table td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .standings-table tr:last-child td { border-bottom:none; }
  .standings-table tr:hover td { background:var(--surface2); }
  .rank-cell { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.05em; width:40px; }
  .rank-1 { color:var(--gold); } .rank-2 { color:var(--silver); } .rank-3 { color:var(--bronze); }
  .team-name-cell { font-weight:600; }
  .team-members-cell { font-size:.75rem; color:var(--muted); }
  .pts-cell { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:.05em; color:var(--accent); text-align:right; vertical-align:middle; }
  .pts-wrap { display:inline-flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .pts-badges { display:flex; gap:0; flex-wrap:wrap; justify-content:flex-end; }
  .pts-badges span { margin-right:0 !important; margin-left:3px; }
  .pts-value { line-height:1; }

  /* ── CHAMPION ── */
  .champion-banner { background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(200,255,0,.05)); border:1px solid rgba(245,200,66,.3); border-radius:4px; padding:2rem; text-align:center; margin-bottom:2rem; }
  .champion-label { font-family:'Barlow Condensed',sans-serif; font-size:.75rem; font-weight:600; letter-spacing:.3em; text-transform:uppercase; color:var(--gold); margin-bottom:.4rem; }
  .champion-name { font-family:'Bebas Neue',sans-serif; font-size:3rem; letter-spacing:.1em; color:var(--gold); }
  .champion-players { font-size:.9rem; color:var(--muted); margin-top:.3rem; }

  /* ── FOCUS MODE ── */
  .focus-mode-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background:var(--bg); flex-direction:column; align-items:center; justify-content:center; overflow:hidden;
  }
  .focus-mode-overlay.active { display:flex; }
  .focus-header {
    position:absolute; top:0; left:0; right:0; z-index:2;
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 2rem; background:var(--bg); border-bottom:1px solid var(--border); backdrop-filter:blur(12px);
  }
  .focus-logo { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:.12em; color:var(--accent); }
  .focus-logo span { color:var(--text); }
  .focus-counter { font-family:'Barlow Condensed',sans-serif; font-size:.8rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .backup-indicator {
    font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:700;
    letter-spacing:.12em; text-transform:uppercase; padding:3px 9px; border-radius:3px; white-space:nowrap;
  }
  .backup-indicator.bi-ok    { color:var(--accent); background:rgba(200,255,0,.1); }
  .backup-indicator.bi-warn  { color:var(--muted);  background:var(--surface2); }
  .backup-indicator.bi-stale { color:#fff; background:var(--accent2); }
  .focus-stage { display:flex; align-items:center; gap:1.5rem; width:100%; max-width:1100px; padding:0 2rem; }
  .focus-side-card {
    flex:0 0 220px; background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:1.4rem 1.2rem; opacity:.45; cursor:pointer; min-height:160px;
    display:flex; flex-direction:column; justify-content:center; gap:.8rem; transition:opacity .2s;
  }
  .focus-side-card:hover { opacity:.7; }
  .focus-side-card.next-up {
    opacity:1; border-color:var(--accent); border-width:2px;
    box-shadow:0 0 24px rgba(200,255,0,.12);
  }
  .focus-side-card.next-up .focus-side-label { color:var(--accent); }
  .focus-side-card.empty { opacity:.15; cursor:default; pointer-events:none; }
  .focus-side-label { font-family:'Barlow Condensed',sans-serif; font-size:.65rem; font-weight:600; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); }
  .focus-side-match-no { font-family:'Barlow Condensed',sans-serif; font-size:.7rem; letter-spacing:.1em; color:var(--muted); margin-bottom:.5rem; }
  .focus-side-team { font-family:'Bebas Neue',sans-serif; font-size:1.15rem; letter-spacing:.05em; line-height:1.1; }
  .focus-side-players { font-size:.7rem; color:var(--muted); line-height:1.4; }
  .focus-side-vs { font-family:'Barlow Condensed',sans-serif; font-size:.65rem; letter-spacing:.2em; color:var(--border); margin:2px 0; }
  .focus-side-score { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:.1em; color:var(--muted); margin-top:.3rem; }
  .focus-card { flex:1; background:var(--surface); border:1px solid var(--accent); border-radius:6px; padding:2.5rem 2rem 1.8rem; text-align:center; box-shadow:0 0 60px rgba(200,255,0,.07); min-width:0; }
  .focus-match-label { font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:600; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); margin-bottom:1.6rem; }
  .focus-next-banner {
    margin-top:1.6rem; padding-top:1.2rem; border-top:1px dashed var(--border);
    display:flex; flex-direction:column; gap:.3rem; align-items:center;
  }
  .focus-next-label { font-family:'Barlow Condensed',sans-serif; font-size:.7rem; font-weight:700; letter-spacing:.25em; text-transform:uppercase; color:var(--accent); }
  .focus-now-label { font-family:'Barlow Condensed',sans-serif; font-size:1.15rem; font-weight:700; letter-spacing:.25em; text-transform:uppercase; color:var(--accent); margin-bottom:1rem; }
  .focus-next-teams { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:.04em; color:var(--text); }
  .focus-next-vs { font-family:'Barlow Condensed',sans-serif; font-size:.85rem; letter-spacing:.15em; color:var(--muted); margin:0 .3rem; }
  .focus-vs-row { display:grid; grid-template-columns:1fr auto 1fr; gap:.8rem; align-items:center; margin-bottom:2rem; }
  .focus-team { display:flex; flex-direction:column; gap:4px; text-align:center; align-items:center; }
  .focus-team.right { text-align:center; align-items:center; }
  .focus-team-name { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:.06em; line-height:1; }
  .focus-team-players { font-size:.75rem; color:var(--muted); }
  .focus-vs { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:.2em; color:var(--border); }
  .focus-score-row { display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:1.5rem; }
  .focus-score-input {
    width:4.6rem !important; text-align:center;
    font-family:'Bebas Neue',sans-serif; font-size:2.6rem !important; padding:.4rem .5rem !important; letter-spacing:.08em;
    background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); outline:none; transition:border-color .2s; -moz-appearance:textfield;
  }
  .focus-score-input:focus { border-color:var(--accent); }
  .focus-score-input::-webkit-inner-spin-button { -webkit-appearance:none; }
  .focus-score-divider { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--muted); }
  .focus-actions { display:flex; gap:.5rem; justify-content:center; align-items:center; }
  .focus-arrow-btn {
    background:var(--surface2); border:1px solid var(--border); border-radius:3px;
    color:var(--text); font-size:1rem; width:2.2rem; height:2.2rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s;
  }
  .focus-arrow-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .focus-arrow-btn:disabled { opacity:.25; cursor:not-allowed; }
  .focus-progress-wrap { position:absolute; bottom:0; left:0; right:0; height:3px; background:var(--surface2); }
  .focus-progress-fill { height:100%; background:var(--accent); transition:width .4s ease; }
  .focus-all-done { text-align:center; }
  .focus-all-done-icon { font-size:3rem; margin-bottom:1rem; }
  .focus-all-done-title { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:.1em; color:var(--accent); margin-bottom:.5rem; }
  .focus-all-done-sub { color:var(--muted); font-size:.9rem; margin-bottom:1.5rem; }

  /* ── TEAM EDITOR BOX ── */
  /* When a card has its editor open, flatten its bottom + remove the gap */
  .tournament-card.editing-open {
    border-color:var(--accent);
    border-bottom:none;
    border-radius:4px 4px 0 0;
    margin-bottom:0;
  }
  .team-editor-box {
    margin-bottom:.7rem;
    border:1px solid var(--accent);
    border-top:none;
    border-radius:0 0 4px 4px;
    padding:0; overflow:hidden;
  }
  .team-editor-head {
    display:flex; justify-content:space-between; align-items:center;
    padding:1rem 1.2rem;
    background:rgba(200,255,0,.06);
    border-bottom:1px solid var(--border);
  }
  body.light .team-editor-head { background:rgba(74,124,0,.06); }
  .team-editor-title {
    font-family:'Barlow Condensed',sans-serif; font-size:.85rem; font-weight:700;
    letter-spacing:.15em; text-transform:uppercase; color:var(--accent);
  }
  .team-editor-box .teams-grid { padding:1.2rem; }
  /* Inner team cards: flatter so they read as items within one panel */
  .team-editor-box .team-card {
    background:transparent;
    border:1px solid var(--border);
  }

  /* ── INLINE TEAM EDIT ── */
  .te-lock-btn {
    background:var(--surface2); border:1px solid var(--border); border-radius:3px;
    color:var(--muted); cursor:pointer; font-size:.85rem; width:1.9rem; height:1.9rem;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s;
  }
  .te-lock-btn:hover, .te-lock-btn.te-unlocked { border-color:var(--accent); color:var(--accent); }
  .te-value { display:block; font-size:.95rem; color:var(--text); padding:2px 4px; min-height:1.4em; }
  .team-name-editable {
    background:none; border:none; border-bottom:1px dashed var(--border);
    color:var(--text); font-family:'Barlow',sans-serif; font-size:.95rem; font-weight:600;
    padding:1px 4px; width:100%; outline:none; transition:border-color .2s;
  }
  .team-name-editable:focus { border-bottom-color:var(--accent); }

  /* ── H2H TIE INDICATOR ── */
  .h2h-badge {
    display:inline-block; font-family:'Barlow Condensed',sans-serif;
    font-size:.6rem; font-weight:700; letter-spacing:.1em;
    background:var(--accent2); color:#fff; border-radius:2px;
    padding:1px 5px; margin-right:6px; vertical-align:middle;
  }
  .win-badge {
    display:inline-block; font-family:'Barlow Condensed',sans-serif;
    font-size:.6rem; font-weight:700; letter-spacing:.1em;
    background:#4a7c00; color:#fff; border-radius:2px;
    padding:1px 5px; margin-right:6px; vertical-align:middle;
  }
  .undecided-badge {
    display:inline-block; font-family:'Barlow Condensed',sans-serif;
    font-size:.6rem; font-weight:700; letter-spacing:.1em;
    background:#888; color:#fff; border-radius:2px;
    padding:1px 5px; margin-right:6px; vertical-align:middle;
  }
  .h2h-note .undecided-badge { margin-left:0; }
  .h2h-note .win-badge { margin-left:0; }
  .standings-table tr.tied-row td { background:rgba(255,107,43,.05); }
  .standings-scroll { overflow-x:auto; }
  .tally-col { background:rgba(200,255,0,.06); font-size:.8rem; }
  body.light .tally-col { background:rgba(74,124,0,.06); }
  .h2h-note {
    font-size:.75rem; color:var(--muted); padding:.7rem 1rem;
    border-top:1px solid var(--border); display:flex; align-items:center; gap:.5rem;
  }
  .h2h-note .h2h-badge { margin-left:0; }

  /* ── CONFIRM MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,.6); align-items:center; justify-content:center; padding:1.5rem;
    -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);
  }
  .modal-overlay.active { display:flex; }
  .modal-box {
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:1.6rem 1.6rem 1.3rem; max-width:380px; width:100%;
    box-shadow:0 12px 48px rgba(0,0,0,.4);
  }
  .modal-msg { font-size:1rem; line-height:1.5; color:var(--text); margin-bottom:1.4rem; }
  .modal-actions { display:flex; gap:.6rem; justify-content:flex-end; }

  /* ── PRINT ── */
  #printHeader { display:none; }
  .print-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:.06em; color:#000; }
  .print-date  { font-size:.95rem; color:#333; margin-bottom:1rem; }

  @media print {
    /* Hide everything except the standings view */
    header, .nav-tabs, #view-setup, #view-matches, .focus-mode-overlay,
    .no-print, #standingsSub, .champion-banner { display:none !important; }

    body { background:#fff !important; color:#000 !important; }
    body, body.light { --bg:#fff; --surface:#fff; --surface2:#fff; --text:#000; --muted:#444; --border:#999; }

    main { max-width:none; margin:0; padding:0; }
    #view-standings { display:block !important; }
    #printHeader { display:block !important; margin-bottom:.5rem; }

    .section-title { color:#000; }
    .card { border:none !important; padding:0 !important; margin:0 0 1rem !important; }
    .standings-table { font-size:11pt; }
    .standings-table th, .standings-table td { border-bottom:1px solid #ccc !important; padding:.4rem .6rem; }
    .standings-table tr:hover td { background:none !important; }
    .standings-table tr.tied-row td { background:#f3f3f3 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .tally-col { background:#f7f7f7 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .pts-cell { color:#000 !important; }
    .rank-1, .rank-2, .rank-3 { color:#000 !important; }

    /* Keep badge backgrounds visible in print */
    .h2h-badge { background:#d4500a !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .win-badge { background:#4a7c00 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .undecided-badge { background:#888 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .h2h-note { color:#333 !important; border-top:1px solid #ccc !important; }

  }

  /* ── RESPONSIVE ── */
  @media (max-width:780px) { .focus-side-card { display:none; } }
  @media (max-width:600px) {
    main { padding:1rem; }
    .match-card { grid-template-columns:1fr; text-align:center; }
    .match-team.right { text-align:center; }
    .score-input { width:3rem !important; }
    .teams-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body class="light">

<header>
  <div class="logo">SHOOT<span>COMP</span></div>
  <div class="header-phase" id="headerPhase"><span class="dot"></span>Nastavení</div>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span id="themeIcon">🌙</span>
    <span id="themeLabel">Tmavý</span>
  </button>
</header>

<div class="nav-tabs">
  <button class="tab-btn active" id="tab-setup"      onclick="switchTab('setup')">① Nastavení</button>
  <button class="tab-btn" id="tab-matches"    onclick="switchTab('matches')"   disabled>② Souboje</button>
  <button class="tab-btn" id="tab-standings"  onclick="switchTab('standings')" disabled>③ Výsledky</button>
</div>

<main>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <div class="modal-msg" id="confirmModalMsg"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirmModalCancel">Zrušit</button>
        <button class="btn btn-danger" id="confirmModalOk">Smazat</button>
      </div>
    </div>
  </div>

  <!-- SETUP -->
  <div id="view-setup">
    <div class="flex justify-between align-center" style="margin-bottom:.3rem">
      <div class="section-title">Závody</div>
      <div class="flex gap-1">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('importFile').click()" title="Načíst zálohu">&#8593; Import</button>
        <button class="btn btn-primary btn-sm" onclick="showNewTournamentForm()">+ Nový závod</button>
      </div>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importTournamentFile(this)">
    <div class="section-sub">Vytvořte závody níže. Kliknutím jeden otevřete.</div>
    <div id="alertSetup" class="alert error"></div>
    <div id="tournamentCards"></div>

    <div id="tournamentForm" class="card hidden" style="margin-top:1rem;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;">
        <div><label>Název závodu</label><input type="text" id="formName" placeholder="např. Jarní pohár 2026"></div>
        <div><label>Datum</label><input type="text" id="formDate" placeholder="DD.MM.RRRR"></div>
      </div>
      <div class="team-count-row" style="margin-bottom:1rem;">
        <div><label>Počet týmů</label><input type="number" id="teamCount" value="4" min="2" max="40" style="width:7rem"></div>
        <div><label>Počet kol</label><input type="number" id="roundCount" value="1" min="1" max="20" style="width:7rem"></div>
        <button class="btn btn-secondary btn-sm" onclick="generateTeamInputs()">Generovat týmy</button>
      </div>
      <div id="teamsContainer" class="teams-grid"></div>
      <div class="mt-2 flex gap-1">
        <button class="btn btn-primary" id="formStartBtn" onclick="startTournament()">Spustit závod →</button>
        <button class="btn btn-secondary" onclick="hideTournamentForm()">Zrušit</button>
      </div>
    </div>
  </div>

  <!-- MATCHES -->
  <div id="view-matches" class="hidden">
    <div class="flex justify-between align-center" style="margin-bottom:.3rem">
      <div class="section-title" id="matchesTitle">Matches</div>
      <div class="flex gap-1">
        <button class="btn btn-secondary btn-sm" onclick="addRound()">+ Přidat kolo</button>
        <button class="btn btn-danger btn-sm" onclick="resetTournament()">Smazat</button>
      </div>
    </div>
    <div class="section-sub" id="matchesSub"></div>
    <div class="progress-text" id="progressText">0 / 0 soubojů dokončeno</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="filter-row">
      <button class="filter-btn active" id="filter-all"     onclick="setFilter('all')">Vše</button>
      <button class="filter-btn"        id="filter-pending" onclick="setFilter('pending')">Čekající</button>
      <button class="filter-btn"        id="filter-done"    onclick="setFilter('done')">Hotové</button>
      <button class="filter-btn" onclick="openFocusMode()" style="margin-left:auto;border-color:var(--accent);color:var(--accent);">⊙ Soustředěný režim</button>
    </div>
    <div id="matchesContainer"></div>
  </div>

  <!-- FOCUS OVERLAY -->
  <div class="focus-mode-overlay" id="focusOverlay">
    <div class="focus-header">
      <div class="focus-logo">SHOOT<span>COMP</span></div>
      <div class="focus-counter" id="focusCounter"></div>
      <div class="flex gap-1 align-center">
        <span id="backupIndicator" class="backup-indicator"></span>
        <button class="btn btn-secondary btn-sm" onclick="exportTournament(activeTournamentId)" title="Záloha (export)">&#8595; Záloha</button>
        <button class="btn btn-secondary btn-sm" onclick="closeFocusMode()">✕ Ukončit režim</button>
      </div>
    </div>
    <div id="focusContent" style="width:100%;display:flex;justify-content:center;"></div>
    <div class="focus-progress-wrap"><div class="focus-progress-fill" id="focusProgressFill"></div></div>
  </div>

  <!-- STANDINGS -->
  <div id="view-standings" class="hidden">
    <div class="flex justify-between align-center" style="margin-bottom:.3rem">
      <div class="section-title">Výsledky</div>
      <button class="btn btn-secondary btn-sm no-print" onclick="printStandings()">🖨 Tisk / PDF</button>
    </div>
    <div class="section-sub" id="standingsSub">Body = celkové skóre. Řazeno podle celkového skóre.</div>
    <!-- Print-only header (závod name + date) -->
    <div id="printHeader"></div>
    <div id="championBanner"></div>
    <div id="standingsContainer"></div>
  </div>

</main>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let tournaments = [];
let activeTournamentId = null;

// Points to the active tournament object
function T() { return tournaments.find(t => t.id === activeTournamentId) || null; }

// Proxy so legacy code using state.X still works
const state = {
  get teams()         { return T()?.teams        ?? []; },
  set teams(v)        { if (T()) T().teams = v; },
  get matches()       { return T()?.matches      ?? []; },
  set matches(v)      { if (T()) T().matches = v; },
  get totalRounds()   { return T()?.totalRounds  ?? 1; },
  set totalRounds(v)  { if (T()) T().totalRounds = v; },
  get tournamentName(){ return T()?.name         ?? ''; },
  get tournamentDate(){ return T()?.date         ?? ''; },
  get phase()         { return T()?.phase        ?? 'setup'; },
  set phase(v)        { if (T()) T().phase = v; },
};

function newId() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

let currentFilter = 'all';

// ─────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────
function switchTab(tab) {
  ['setup','matches','standings'].forEach(t => {
    document.getElementById('view-'+t).classList.toggle('hidden', t !== tab);
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  if (tab === 'standings') renderStandings();
  if (tab === 'matches')   renderMatches();
}

function enableTabs() {
  document.getElementById('tab-matches').disabled = false;
  document.getElementById('tab-standings').disabled = false;
}

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
function generateTeamInputs(existing = []) {
  const n = parseInt(document.getElementById('teamCount').value) || 4;
  if (n < 2 || n > 40) { showAlert('alertSetup','Počet týmů musí být 2–40.'); return; }
  hideAlert('alertSetup');
  document.getElementById('teamsContainer').innerHTML = Array.from({length:n}, (_, i) => {
    const p = existing[i] || {};
    return `<div class="team-card">
      <div class="team-number">Tým ${i+1}</div>
      <div class="team-fields">
        <div><label>Název týmu</label><input type="text" id="tname_${i}" placeholder="Tým ${i+1}" value="${esc(p.name||'')}"></div>
        <div><label>Člen 1</label><input type="text" id="tp1_${i}"   placeholder="Jméno střelce"  value="${esc(p.p1  ||'')}"></div>
        <div><label>Člen 2</label><input type="text" id="tp2_${i}"   placeholder="Jméno střelce"  value="${esc(p.p2  ||'')}"></div>
      </div>
    </div>`;
  }).join('');
}

function readTeamsFromForm(n) {
  return Array.from({length:n}, (_, i) => ({
    name: document.getElementById(`tname_${i}`)?.value.trim() || `Tým ${i+1}`,
    p1:   document.getElementById(`tp1_${i}`)  ?.value.trim() || 'Střelec A',
    p2:   document.getElementById(`tp2_${i}`)  ?.value.trim() || 'Střelec B',
  }));
}

function startTournament() {
  const n      = parseInt(document.getElementById('teamCount').value) || 4;
  const teams  = readTeamsFromForm(n);
  if (teams.length < 2) { showAlert('alertSetup','Potřebujete alespoň 2 týmy.'); return; }

  const rounds = Math.max(1, parseInt(document.getElementById('roundCount').value) || 1);
  const name   = document.getElementById('formName').value.trim() || 'Závod';
  const date   = document.getElementById('formDate').value.trim();

  const editingId = document.getElementById('tournamentForm').dataset.editingId;
  let t = editingId ? tournaments.find(x => x.id === editingId) : null;

  if (t && t.phase === 'setup') {
    Object.assign(t, {name, date, teams, totalRounds:rounds, matches:[]});
  } else {
    t = {id:newId(), name, date, teams, totalRounds:rounds, matches:[], phase:'matches'};
    tournaments.push(t);
  }
  for (let r = 1; r <= rounds; r++) {
    generateRoundRobin(teams.length).forEach(m => { m.round = r; t.matches.push(m); });
  }
  t.phase = 'matches';
  activeTournamentId = t.id;

  hideTournamentForm();
  renderTournamentCards();
  enableTabs();
  saveAll();
  switchTab('matches');
  updateHeaderPhase('Souboje');
}

function showNewTournamentForm() {
  const form = document.getElementById('tournamentForm');
  form.classList.remove('hidden');
  form.dataset.editingId = '';
  document.getElementById('formStartBtn').textContent = 'Spustit závod →';
  const now = new Date();
  document.getElementById('formName').value  = '';
  document.getElementById('formDate').value  = `${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()}`;
  document.getElementById('teamCount').value = 4;
  document.getElementById('roundCount').value = 1;
  generateTeamInputs();
  form.scrollIntoView({behavior:'smooth'});
}

function hideTournamentForm() {
  document.getElementById('tournamentForm').classList.add('hidden');
  document.getElementById('teamsContainer').innerHTML = '';
}

// ─────────────────────────────────────────────
//  ROUND ROBIN ALGORITHM
// ─────────────────────────────────────────────
function generateRoundRobin(n) {
  const size = n % 2 === 0 ? n : n + 1;
  const rounds = [];
  let arr = Array.from({length:size}, (_, i) => i);

  for (let r = 0; r < size - 1; r++) {
    const round = [];
    for (let i = 0; i < size / 2; i++) {
      const a = arr[i], b = arr[size-1-i];
      if (a < n && b < n) round.push({a:Math.min(a,b), b:Math.max(a,b)});
    }
    rounds.push(round);
    arr = [arr[0], arr[size-1], ...arr.slice(1, size-1)];
  }

  // Flatten round-by-round with per-round offset so no team starts every round
  const schedule = [];
  rounds.forEach((round, ri) => {
    const offset = ri % round.length;
    [...round.slice(offset), ...round.slice(0, offset)]
      .forEach(m => schedule.push({...m, scoreA:'', scoreB:'', done:false}));
  });

  // Balance left/right appearances per team
  const leftCount = new Array(n).fill(0);
  schedule.forEach(m => leftCount[m.a]++);
  schedule.forEach(m => {
    if (leftCount[m.a] > leftCount[m.b] + 1) {
      [m.a, m.b] = [m.b, m.a];
      leftCount[m.a]++; leftCount[m.b]--;
    }
  });
  return schedule;
}

// ─────────────────────────────────────────────
//  TOURNAMENT CARD LIST
// ─────────────────────────────────────────────
function renderTournamentCards() {
  const container = document.getElementById('tournamentCards');
  if (!container) return;
  if (!tournaments.length) {
    container.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:2rem;">Zatím žádné závody. Klikněte na + Nový závod.</div>';
    return;
  }
  container.innerHTML = '';
  tournaments.forEach(t => {
    const done  = t.matches.filter(m => m.done).length;
    const total = t.matches.length;
    const isActive = t.id === activeTournamentId;
    const [statusLabel, statusClass] =
      t.phase === 'setup'              ? ['Nastavení', 't-status-setup']  :
      done === total && total > 0      ? ['Dokončeno', 't-status-done']   :
                                         [`${done}/${total} soubojů`, 't-status-active'];

    const card = document.createElement('div');
    card.className = 'tournament-card' + (isActive ? ' active-t' : '');
    card.onclick = () => openTournament(t.id);
    card.innerHTML =
      `<div class="t-card-info">
        <div class="t-card-name">${esc(t.name||'Unnamed')}</div>
        <div class="t-card-meta">${t.date||''}${t.date&&t.teams.length?' · ':''}${t.teams.length} týmů · ${t.totalRounds} ${t.totalRounds>1?'kol':'kolo'}</div>
      </div>
      <span class="t-card-status ${statusClass}">${statusLabel}</span>
      <div class="t-card-actions">
        <button class="btn btn-secondary btn-sm" data-tid="${t.id}" onclick="exportTournament(this.dataset.tid,event)" style="padding:.3rem .7rem" title="Záloha (export)">&#8595;</button>
        <button class="btn btn-secondary btn-sm" data-tid="${t.id}" onclick="openTeamEditor(this.dataset.tid,event)" style="padding:.3rem .7rem" title="Upravit týmy">&#9998;</button>
        <button class="btn btn-danger btn-sm"    data-tid="${t.id}" onclick="deleteTournament(this.dataset.tid,event)" style="padding:.3rem .7rem" title="Smazat">&#x2715;</button>
      </div>`;
    container.appendChild(card);
  });
}

function openTournament(id) {
  const wasActive = activeTournamentId === id;
  activeTournamentId = id;
  const t = T();
  if (!t) return;
  if (!wasActive) { renderTournamentCards(); saveAll(); }
  if (t.phase !== 'setup') { enableTabs(); switchTab('matches'); updateHeaderPhase('Souboje'); }
  else switchTab('setup');
}

async function deleteTournament(id, e) {
  e.stopPropagation();
  if (!await confirmDialog('Smazat tento závod?')) return;
  tournaments = tournaments.filter(t => t.id !== id);
  if (activeTournamentId === id) {
    activeTournamentId = null;
    document.getElementById('tab-matches').disabled = true;
    document.getElementById('tab-standings').disabled = true;
  }
  renderTournamentCards();
  saveAll();
}

async function resetTournament() {
  if (!await confirmDialog('Smazat závod? Všechny výsledky budou ztraceny.')) return;
  tournaments = tournaments.filter(t => t.id !== activeTournamentId);
  activeTournamentId = null;
  document.getElementById('tab-matches').disabled = true;
  document.getElementById('tab-standings').disabled = true;
  renderTournamentCards();
  saveAll();
  switchTab('setup');
  updateHeaderPhase('Nastavení');
}

// ─────────────────────────────────────────────
//  MATCHES
// ─────────────────────────────────────────────
function renderMatches() {
  const container = document.getElementById('matchesContainer');
  container.innerHTML = '';
  const matches = state.matches;
  const total   = matches.length;
  const done    = matches.filter(m => m.done).length;

  document.getElementById('progressText').textContent = `${done} / ${total} soubojů dokončeno`;
  document.getElementById('progressBar').style.width  = total ? `${done/total*100}%` : '0%';

  const titleEl = document.getElementById('matchesTitle');
  if (titleEl) titleEl.textContent = state.tournamentName || 'Matches';

  const roundLabel = state.totalRounds > 1 ? `Kola 1–${state.totalRounds}` : 'Kolo 1';
  document.getElementById('matchesSub').textContent =
    (state.tournamentDate ? state.tournamentDate + ' · ' : '') +
    `${roundLabel} · ${total} soubojů celkem. Zadejte skóre a uložte.`;

  let lastRound = null;
  matches.forEach((m, idx) => {
    if (currentFilter === 'pending' && m.done)  return;
    if (currentFilter === 'done'    && !m.done) return;

    if (m.round !== lastRound) {
      lastRound = m.round;
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0 .5rem;border-top:1px solid var(--border);margin-top:.4rem;';
      if (m.round === 1) div.style.borderTop = 'none';
      div.innerHTML =
        `<span style="font-family:sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);">Kolo ${m.round}</span>
         <button class="btn btn-danger btn-sm" onclick="deleteRound(${m.round})" style="padding:.25rem .7rem;font-size:.65rem;">&#x2715; Smazat kolo</button>`;
      container.appendChild(div);
    }

    const ta = state.teams[m.a], tb = state.teams[m.b];
    const card = document.createElement('div');
    card.className = `match-card ${m.done ? 'done' : 'active'}`;
    card.id = `match_${idx}`;

    if (m.done) {
      const aWon = m.scoreA > m.scoreB, bWon = m.scoreB > m.scoreA;
      card.innerHTML =
        `<div class="match-team">
          <div class="match-team-name ${aWon?'rank-1':''}">${esc(ta.name)}</div>
          <div class="match-team-players">${esc(ta.p1)} · ${esc(ta.p2)}</div>
        </div>
        <div>
          <div class="match-number">Souboj ${idx+1}</div>
          <div class="match-result-display">
            <span class="${aWon?'winner':''}">${m.scoreA}</span>
            <span style="color:var(--border)"> : </span>
            <span class="${bWon?'winner':''}">${m.scoreB}</span>
          </div>
          <div style="text-align:center;margin-top:4px;">
            <button class="btn btn-secondary btn-sm" onclick="undoMatch(${idx})">Upravit</button>
          </div>
        </div>
        <div class="match-team right">
          <div class="match-team-name ${bWon?'rank-1':''}">${esc(tb.name)}</div>
          <div class="match-team-players">${esc(tb.p1)} · ${esc(tb.p2)}</div>
        </div>`;
    } else {
      card.innerHTML =
        `<div class="match-team">
          <div class="match-team-name">${esc(ta.name)}</div>
          <div class="match-team-players">${esc(ta.p1)} · ${esc(ta.p2)}</div>
        </div>
        <div>
          <div class="match-number">Souboj ${idx+1}</div>
          <div class="match-score-area">
            <input type="number" inputmode="numeric" pattern="[0-7]" class="score-input" id="sa_${idx}" placeholder="0" min="0" max="7" oninput="filterScore(this)" value="${m.scoreA}">
            <span class="score-divider">:</span>
            <input type="number" inputmode="numeric" pattern="[0-7]" class="score-input" id="sb_${idx}" placeholder="0" min="0" max="7" oninput="filterScore(this)" value="${m.scoreB}">
          </div>
          <button class="btn btn-primary btn-sm match-submit-btn" onclick="saveMatch(${idx})">Uložit výsledek</button>
        </div>
        <div class="match-team right">
          <div class="match-team-name">${esc(tb.name)}</div>
          <div class="match-team-players">${esc(tb.p1)} · ${esc(tb.p2)}</div>
        </div>`;
    }
    container.appendChild(card);
  });

  if (!container.querySelector('.match-card')) {
    container.innerHTML += '<div class="card" style="text-align:center;color:var(--muted);padding:2rem;">Žádné souboje v tomto filtru.</div>';
  }
}

async function saveMatch(idx) {
  const sa = parseInt(document.getElementById(`sa_${idx}`)?.value);
  const sb = parseInt(document.getElementById(`sb_${idx}`)?.value);
  if (isNaN(sa) || isNaN(sb) || sa < 0 || sb < 0 || sa > 7 || sb > 7) {
    document.getElementById(`sa_${idx}`)?.focus(); return;
  }
  if (sa === 7 && sb === 7) {
    await confirmDialog('Výsledek 7:7 není možný.', 'OK');
    document.getElementById(`sa_${idx}`)?.focus(); return;
  }
  Object.assign(state.matches[idx], {scoreA:sa, scoreB:sb, done:true});
  save();
  renderMatches();
  if (state.matches.every(m => m.done)) { updateHeaderPhase('Dokončeno'); switchTab('standings'); }
}

function undoMatch(idx) {
  state.matches[idx].done = false;
  save(); renderMatches();
}

function setFilter(f) {
  currentFilter = f;
  ['all','pending','done'].forEach(x =>
    document.getElementById('filter-'+x).classList.toggle('active', x === f)
  );
  renderMatches();
}

// ─────────────────────────────────────────────
//  ROUNDS
// ─────────────────────────────────────────────
function addRound() {
  const next = state.totalRounds + 1;
  generateRoundRobin(state.teams.length).forEach(m => { m.round = next; state.matches.push(m); });
  state.totalRounds = next;
  save(); renderMatches();
}

async function deleteRound(roundNum) {
  const roundMatches = state.matches.filter(m => m.round === roundNum);
  const hasDone = roundMatches.some(m => m.done);
  const msg = hasDone
    ? `Smazat kolo ${roundNum}? Odstraní ${roundMatches.length} soubojů a výsledků.`
    : `Smazat kolo ${roundNum}? Odstraní ${roundMatches.length} soubojů.`;
  if (!await confirmDialog(msg)) return;
  state.matches = state.matches.filter(m => m.round !== roundNum);
  state.matches.forEach(m => { if (m.round > roundNum) m.round--; });
  state.totalRounds = Math.max(1, state.totalRounds - 1);
  save(); renderMatches();
}

// ─────────────────────────────────────────────
//  FOCUS MODE
// ─────────────────────────────────────────────
let focusCursor = 0;

function openFocusMode() {
  focusCursor = state.matches.findIndex(m => !m.done);
  if (focusCursor === -1) focusCursor = state.matches.length - 1;
  document.getElementById('focusOverlay').classList.add('active');
  renderFocusMatch();
}

function closeFocusMode() {
  document.getElementById('focusOverlay').classList.remove('active');
  renderMatches();
}

function moveFocusCursor(delta) {
  const n = focusCursor + delta;
  if (n >= 0 && n < state.matches.length) { focusCursor = n; renderFocusMatch(); }
}

function sideCardHTML(idx, label) {
  if (idx < 0 || idx >= state.matches.length) return '<div class="focus-side-card empty"></div>';
  const m = state.matches[idx];
  const ta = state.teams[m.a], tb = state.teams[m.b];
  const isNext = label === 'DALŠÍ';
  const dir = label === 'PŘEDCHOZÍ' ? -1 : 1;
  return `<div class="focus-side-card${isNext ? ' next-up' : ''}" onclick="moveFocusCursor(${dir})">
    <div>
      <div class="focus-side-label">${label}</div>
      <div class="focus-side-match-no">Souboj ${idx+1}</div>
    </div>
    <div>
      <div class="focus-side-team">${esc(ta.name)}</div>
      <div class="focus-side-players">${esc(ta.p1)} · ${esc(ta.p2)}</div>
      <div class="focus-side-vs">vs</div>
      <div class="focus-side-team">${esc(tb.name)}</div>
      <div class="focus-side-players">${esc(tb.p1)} · ${esc(tb.p2)}</div>
      ${m.done ? `<div class="focus-side-score">${m.scoreA} : ${m.scoreB}</div>` : ''}
    </div>
  </div>`;
}

function renderFocusMatch() {
  const matches = state.matches;
  const total   = matches.length;
  const done    = matches.filter(m => m.done).length;

  document.getElementById('focusCounter').textContent     = `${done} / ${total} hotovo`;
  document.getElementById('focusProgressFill').style.width = total ? `${done/total*100}%` : '0%';
  updateBackupIndicator();

  const content = document.getElementById('focusContent');

  if (done === total && total > 0) {
    content.innerHTML = `<div class="focus-all-done">
      <div class="focus-all-done-icon">🏆</div>
      <div class="focus-all-done-title">Všechny souboje dokončeny!</div>
      <div class="focus-all-done-sub">Všechny výsledky byly zadány.</div>
      <button class="btn btn-primary" onclick="closeFocusMode();switchTab('standings')">Zobrazit výsledky →</button>
    </div>`;
    return;
  }

  const idx  = focusCursor;
  const m    = matches[idx];
  const ta   = state.teams[m.a], tb = state.teams[m.b];
  const prev = idx > 0, next = idx < total - 1;
  const roundSuffix = state.totalRounds > 1 ? ` · Kolo ${m.round}` : '';

  // Banner showing who is up next (the match after the current one)
  let nextBanner = '';
  if (next) {
    const nm = matches[idx+1];
    const nta = state.teams[nm.a], ntb = state.teams[nm.b];
    nextBanner = `<div class="focus-next-banner">
      <span class="focus-next-label">Připravuje se</span>
      <span class="focus-next-teams">${esc(nta.name)} <span class="focus-next-vs">vs</span> ${esc(ntb.name)}</span>
    </div>`;
  } else {
    nextBanner = `<div class="focus-next-banner"><span class="focus-next-label">Poslední souboj</span></div>`;
  }

  let mainCard;
  if (!m.done) {
    mainCard = `<div class="focus-card">
      <div class="focus-match-label">Souboj ${idx+1} z ${total}${roundSuffix}</div>
      <div class="focus-now-label">Střílí</div>
      <div class="focus-vs-row">
        <div class="focus-team"><div class="focus-team-name">${esc(ta.name)}</div><div class="focus-team-players">${esc(ta.p1)}<br>${esc(ta.p2)}</div></div>
        <div class="focus-vs">VS</div>
        <div class="focus-team right"><div class="focus-team-name">${esc(tb.name)}</div><div class="focus-team-players">${esc(tb.p1)}<br>${esc(tb.p2)}</div></div>
      </div>
      <div class="focus-score-row">
        <input type="number" inputmode="numeric" pattern="[0-7]" class="focus-score-input" id="fsa" placeholder="0" min="0" max="7" oninput="filterScore(this)" value="${m.scoreA}">
        <span class="focus-score-divider">:</span>
        <input type="number" inputmode="numeric" pattern="[0-7]" class="focus-score-input" id="fsb" placeholder="0" min="0" max="7" oninput="filterScore(this)" value="${m.scoreB}">
      </div>
      <div class="focus-actions">
        <button class="focus-arrow-btn" onclick="moveFocusCursor(-1)" ${prev?'':'disabled'}>&#8592;</button>
        <button class="btn btn-primary" onclick="saveFocusMatch(${idx})">Uložit</button>
        <button class="focus-arrow-btn" onclick="moveFocusCursor(1)"  ${next?'':'disabled'}>&#8594;</button>
      </div>
      ${nextBanner}
    </div>`;
  } else {
    const aWon = m.scoreA > m.scoreB, bWon = m.scoreB > m.scoreA;
    mainCard = `<div class="focus-card">
      <div class="focus-match-label">Souboj ${idx+1} z ${total}${roundSuffix} — Dokončeno</div>
      <div class="focus-vs-row">
        <div class="focus-team"><div class="focus-team-name" style="${aWon?'color:var(--accent)':''}">${esc(ta.name)}</div><div class="focus-team-players">${esc(ta.p1)}<br>${esc(ta.p2)}</div></div>
        <div style="text-align:center">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:.1em;color:var(--muted)">
            <span style="${aWon?'color:var(--accent)':''}">${m.scoreA}</span>
            <span style="color:var(--border)"> : </span>
            <span style="${bWon?'color:var(--accent)':''}">${m.scoreB}</span>
          </div>
        </div>
        <div class="focus-team right"><div class="focus-team-name" style="${bWon?'color:var(--accent)':''}">${esc(tb.name)}</div><div class="focus-team-players">${esc(tb.p1)}<br>${esc(tb.p2)}</div></div>
      </div>
      <div class="focus-actions">
        <button class="focus-arrow-btn" onclick="moveFocusCursor(-1)" ${prev?'':'disabled'}>&#8592;</button>
        <button class="btn btn-secondary" onclick="undoFocusMatch(${idx})">Upravit výsledek</button>
        <button class="focus-arrow-btn" onclick="moveFocusCursor(1)"  ${next?'':'disabled'}>&#8594;</button>
      </div>
      ${nextBanner}
    </div>`;
  }

  content.innerHTML = `<div class="focus-stage">${sideCardHTML(idx-1,'PŘEDCHOZÍ')}${mainCard}${sideCardHTML(idx+1,'DALŠÍ')}</div>`;

  if (!m.done) {
    setTimeout(() => document.getElementById('fsa')?.focus(), 50);
    document.getElementById('fsb')?.addEventListener('keydown', e => { if (e.key==='Enter') saveFocusMatch(idx); });
  }
}

async function saveFocusMatch(idx) {
  const sa = parseInt(document.getElementById('fsa')?.value);
  const sb = parseInt(document.getElementById('fsb')?.value);
  if (isNaN(sa) || isNaN(sb) || sa < 0 || sb < 0 || sa > 7 || sb > 7) { document.getElementById('fsa')?.focus(); return; }
  if (sa === 7 && sb === 7) { await confirmDialog('Výsledek 7:7 není možný.', 'OK'); document.getElementById('fsa')?.focus(); return; }
  Object.assign(state.matches[idx], {scoreA:sa, scoreB:sb, done:true});
  save();
  const nextPending = state.matches.findIndex((m, i) => i > idx && !m.done);
  const anyPending  = nextPending !== -1 ? nextPending : state.matches.findIndex(m => !m.done);
  if (anyPending === -1) updateHeaderPhase('Dokončeno');
  else focusCursor = anyPending;
  renderFocusMatch();
}

function undoFocusMatch(idx) {
  state.matches[idx].done = false;
  save(); renderFocusMatch();
}

// ─────────────────────────────────────────────
//  STANDINGS
// ─────────────────────────────────────────────
function calcStandings(roundFilter) {
  const rows = state.teams.map((t, i) => ({i, name:t.name, p1:t.p1, p2:t.p2, played:0, w:0, d:0, l:0, pts:0}));
  const done = state.matches.filter(m => m.done && (roundFilter === undefined || m.round === roundFilter));
  done.forEach(m => {
    const a = rows[m.a], b = rows[m.b];
    const sa = parseInt(m.scoreA), sb = parseInt(m.scoreB);
    a.played++; b.played++;
    a.pts += sa; b.pts += sb;
    if      (sa > sb) { a.w++; b.l++; }
    else if (sb > sa) { b.w++; a.l++; }
    else              { a.d++; b.d++; }
  });

  // Head-to-head wins of team `x` over team `y` in their direct matches
  function h2hWins(x, y) {
    let wins = 0;
    done.forEach(m => {
      if ((m.a === x && m.b === y) || (m.a === y && m.b === x)) {
        const xs = m.a === x ? parseInt(m.scoreA) : parseInt(m.scoreB);
        const ys = m.a === y ? parseInt(m.scoreA) : parseInt(m.scoreB);
        if (xs > ys) wins++;
      }
    });
    return wins;
  }

  // Count how many times team `x` scored exactly `value` across all their matches
  const scoreTally = {};   // scoreTally[teamIndex] = {7:n, 6:n, ...}
  rows.forEach(r => { scoreTally[r.i] = {}; });
  done.forEach(m => {
    const sa = parseInt(m.scoreA), sb = parseInt(m.scoreB);
    scoreTally[m.a][sa] = (scoreTally[m.a][sa] || 0) + 1;
    scoreTally[m.b][sb] = (scoreTally[m.b][sb] || 0) + 1;
  });
  const countOf = (teamIdx, value) => scoreTally[teamIdx][value] || 0;
  // Attach per-value score counts to each row (for the 7×…0× columns)
  rows.forEach(r => { r.scoreCounts = {}; for (let v = 7; v >= 0; v--) r.scoreCounts[v] = countOf(r.i, v); });

  // Compare two teams by score cascade (most 7s, then 6s, ... down to 0).
  // Returns {cmp, decidedBy}: cmp<0 means a ranks first; decidedBy is the score
  // value that broke the tie (or null if identical all the way down).
  function cascade(a, b) {
    for (let v = 7; v >= 0; v--) {
      const av = countOf(a.i, v), bv = countOf(b.i, v);
      if (av !== bv) return { cmp: bv - av, decidedBy: v };
    }
    return { cmp: 0, decidedBy: null };
  }

  rows.sort((a, b) => {
    // 1. total score
    if (b.pts !== a.pts) return b.pts - a.pts;
    // 2. head-to-head wins among the two tied teams
    const aH2H = h2hWins(a.i, b.i);
    const bH2H = h2hWins(b.i, a.i);
    if (bH2H !== aH2H) return bH2H - aH2H;
    // 3. score cascade: most 7s, then 6s, ... down to 0
    const cas = cascade(a, b);
    if (cas.cmp !== 0) return cas.cmp;
    // 4. fewest overall losses
    return a.l - b.l;
  });

  // For each team tied on total score AND tied head-to-head with a neighbour,
  // record which score value decided the order (numbered badge), or flag that
  // the order could NOT be decided by rules 1–3 (undecided '?' badge).
  rows.forEach(r => { r.tieDecidedBy = null; r.tiedScore = false; r.undecided = false; });
  for (let x = 0; x < rows.length; x++) {
    for (let y = x + 1; y < rows.length; y++) {
      if (rows[x].pts !== rows[y].pts) continue;            // not same total score
      rows[x].tiedScore = true; rows[y].tiedScore = true;
      const xy = h2hWins(rows[x].i, rows[y].i);
      const yx = h2hWins(rows[y].i, rows[x].i);
      if (xy === yx) {                                       // also tied head-to-head
        const cas = cascade(rows[x], rows[y]);
        if (cas.decidedBy !== null) {
          // score cascade decided it — record the deciding value
          [rows[x], rows[y]].forEach(rr => {
            if (rr.tieDecidedBy === null || cas.decidedBy > rr.tieDecidedBy) rr.tieDecidedBy = cas.decidedBy;
          });
        } else {
          // tied through score, head-to-head AND the full cascade — cannot decide
          rows[x].undecided = true; rows[y].undecided = true;
        }
      }
    }
  }
  return rows;
}

function standingsTableHTML(rows) {
  // Mark teams that share their total score with at least one other team —
  // their relative order was decided by the head-to-head tiebreaker.
  const ptsCount = {};
  rows.forEach(r => { ptsCount[r.pts] = (ptsCount[r.pts] || 0) + 1; });
  let hasTie = false;

  const tbody = rows.map((r,i) => {
    const rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    const tied = ptsCount[r.pts] > 1;
    if (tied) hasTie = true;
    const badge = tied
      ? '<span class="h2h-badge" title="Shodné skóre – pořadí určeno vzájemnými souboji">X</span>'
        + (r.tieDecidedBy !== null ? `<span class="win-badge" title="Shodné skóre i vzájemné souboje – rozhodl počet zásahů ${r.tieDecidedBy}">${r.tieDecidedBy}</span>` : '')
        + (r.undecided ? '<span class="undecided-badge" title="Nelze rozhodnout – týmy jsou shodné ve skóre, vzájemných soubojích i počtu 7,6,5,4,3,2,1,0">?</span>' : '')
      : '';
    const counts = [7,6,5,4,3,2,1,0].map(v =>
      `<td class="num tally-col">${r.scoreCounts[v] || 0}</td>`).join('');
    return `<tr${tied ? ' class="tied-row"' : ''}>
      <td class="rank-cell ${rc}">${i+1}</td>
      <td><div class="team-name-cell">${esc(r.name)}</div><div class="team-members-cell">${esc(r.p1)}<br>${esc(r.p2)}</div></td>
      <td class="num">${r.played}</td><td class="num">${r.w}</td>
      <td class="num">${r.d}</td><td class="num">${r.l}</td>
      ${counts}
      <td class="pts-cell"><div class="pts-wrap">${badge ? `<span class="pts-badges">${badge}</span>` : ''}<span class="pts-value">${r.pts}</span></div></td>
    </tr>`;
  }).join('');

  return `<table class="standings-table">
    <thead><tr><th>#</th><th>Tým</th><th class="num">Odstříleno</th><th class="num">V</th><th class="num">R</th><th class="num">P</th><th class="num tally-col">7×</th><th class="num tally-col">6×</th><th class="num tally-col">5×</th><th class="num tally-col">4×</th><th class="num tally-col">3×</th><th class="num tally-col">2×</th><th class="num tally-col">1×</th><th class="num tally-col">0×</th><th class="num">Skóre</th></tr></thead>
    <tbody>${tbody}</tbody>
  </table>`;
}

// Footnote/legend (rendered OUTSIDE the horizontal scroll area)
function standingsFootnoteHTML(rows) {
  const ptsCount = {};
  rows.forEach(r => { ptsCount[r.pts] = (ptsCount[r.pts] || 0) + 1; });
  const hasTie        = rows.some(r => ptsCount[r.pts] > 1);
  const hasNumDecided = rows.some(r => r.tieDecidedBy !== null && ptsCount[r.pts] > 1);
  const hasUndecided  = rows.some(r => r.undecided && ptsCount[r.pts] > 1);
  if (!hasTie) return '';
  return `<div class="h2h-note"><span class="h2h-badge">X</span> Shodné skóre – pořadí určeno podle vzájemných soubojů.</div>`
    + (hasNumDecided ? `<div class="h2h-note"><span class="win-badge">7</span> Shodné skóre i vzájemné souboje – rozhodl počet zásahů dané hodnoty (číslo udává rozhodující hodnotu).</div>` : '')
    + (hasUndecided ? `<div class="h2h-note"><span class="undecided-badge">?</span> Nelze rozhodnout – týmy jsou shodné ve skóre, vzájemných soubojích i počtu 7,6,5,4,3,2,1,0.</div>` : '');
}

function makeStandingsLabel(text, color) {
  const el = document.createElement('div');
  el.style.cssText = `font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:${color};padding:1.4rem 0 .5rem;`;
  el.textContent = text;
  return el;
}

function makeStandingsCard(rows, extraStyle) {
  const el = document.createElement('div');
  el.className = 'card';
  el.style.cssText = 'padding:0;overflow:hidden;' + (extraStyle||'');
  // Only the table scrolls horizontally; the footnote stays fixed below it.
  el.innerHTML = `<div class="standings-scroll">${standingsTableHTML(rows)}</div>${standingsFootnoteHTML(rows)}`;
  return el;
}

function renderStandings() {
  const container = document.getElementById('standingsContainer');
  container.innerHTML = '';

  const allDone     = state.matches.length > 0 && state.matches.every(m => m.done);
  const rounds      = [...new Set(state.matches.map(m => m.round))].sort((a,b) => a-b);
  const multiRound  = rounds.length > 1;

  document.getElementById('standingsSub').textContent =
    (state.tournamentName ? state.tournamentName + (state.tournamentDate ? ' · '+state.tournamentDate : '') + ' · ' : '') +
    'Body = celkové skóre. Řazeno podle celkového skóre.';

  // Print-only header
  document.getElementById('printHeader').innerHTML =
    `<div class="print-title">${esc(state.tournamentName || 'Závod')}</div>` +
    (state.tournamentDate ? `<div class="print-date">${esc(state.tournamentDate)}</div>` : '');

  const banner = document.getElementById('championBanner');

  if (multiRound) {
    const overall = calcStandings();
    const anyDone = state.matches.some(m => m.done);
    // Overall total first
    if (anyDone) {
      container.appendChild(makeStandingsLabel('Celkový součet', 'var(--accent)'));
      container.appendChild(makeStandingsCard(overall, 'margin-bottom:.5rem;'));
    }
    // Then per-round tables
    rounds.forEach(r => {
      const rm = state.matches.filter(m => m.round === r);
      if (!rm.some(m => m.done)) return;
      container.appendChild(makeStandingsLabel(`Kolo ${r}${rm.every(m=>m.done)?'':' (probíhá)'}`, 'var(--muted)'));
      container.appendChild(makeStandingsCard(calcStandings(r), 'margin-bottom:.5rem;'));
    });
    if (allDone && anyDone) { showChampion(banner, overall[0]); return; }
  } else {
    const overall = calcStandings();
    container.appendChild(makeStandingsCard(overall));
    if (allDone && overall.length) { showChampion(banner, overall[0]); return; }
  }
  banner.innerHTML = '';
}

function printStandings() {
  const name = (state.tournamentName || 'Zavod').trim();
  const date = (state.tournamentDate || '').trim();
  // Build a clean filename: "Name - Date" (browser uses document.title as default)
  const combined = date ? `${name} - ${date}` : name;
  const original = document.title;
  document.title = combined;
  window.print();
  // Restore after the print dialog (timeout covers async print rendering)
  setTimeout(() => { document.title = original; }, 1000);
}

function showChampion(banner, champ) {
  banner.innerHTML = `<div class="champion-banner">
    <div class="champion-label">🏆 Vítěz závodu</div>
    <div class="champion-name">${esc(champ.name)}</div>
    <div class="champion-players">${esc(champ.p1)} &amp; ${esc(champ.p2)} · ${champ.pts} b</div>
  </div>`;
}

// ─────────────────────────────────────────────
//  TEAM EDITOR
// ─────────────────────────────────────────────
function saveTeamEdit(idx, field, value) {
  if (!T()) return;
  const v = value.trim();
  if (v) T().teams[idx][field] = v;
  saveAll();
  if (!document.getElementById('view-standings').classList.contains('hidden')) renderStandings();
}

function openTeamEditor(tid, e) {
  if (e) e.stopPropagation();
  const existing = document.getElementById('teamEditorInline');
  if (existing) {
    const sameOne = existing.dataset.tid === tid;
    const prev = existing.previousElementSibling;
    if (prev && prev.classList.contains('editing-open')) prev.classList.remove('editing-open');
    existing.remove();
    if (sameOne) return;   // clicking the same pencil again just closes it
  }

  activeTournamentId = tid;
  renderTournamentCards();
  const t = T(); if (!t) return;

  const el = document.createElement('div');
  el.id = 'teamEditorInline'; el.dataset.tid = tid; el.className = 'card team-editor-box';
  el.innerHTML =
    `<div class="team-editor-head">
      <span class="team-editor-title">Upravit týmy — ${esc(t.name)}</span>
      <button class="btn btn-secondary btn-sm" onclick="closeTeamEditor()">Hotovo</button>
    </div>
    <div id="teamEditorGrid" class="teams-grid"></div>`;

  const cards = document.querySelectorAll('#tournamentCards .tournament-card');
  let inserted = false;
  cards.forEach(card => {
    if (card.querySelector(`[data-tid="${tid}"]`)) {
      card.classList.add('editing-open');
      card.after(el);
      inserted = true;
    }
  });
  if (!inserted) document.getElementById('tournamentCards').appendChild(el);

  renderTeamEditor();
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeTeamEditor() {
  const el = document.getElementById('teamEditorInline');
  if (el) {
    const prev = el.previousElementSibling;
    if (prev && prev.classList.contains('editing-open')) prev.classList.remove('editing-open');
    el.remove();
  }
}

function renderTeamEditor() {
  const grid = document.getElementById('teamEditorGrid');
  if (!grid || !T()) return;
  grid.innerHTML = '';
  T().teams.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'team-card'; card.id = 'tec_'+i;
    card.innerHTML = teamEditorRowHTML(t, i, false);
    grid.appendChild(card);
  });
}

function teamEditorRowHTML(t, i, unlocked) {
  function field(id, val, fieldName) {
    return unlocked
      ? `<input class="team-name-editable" type="text" id="${id}" value="${esc(val)}" data-idx="${i}" data-field="${fieldName}" onblur="saveTeamEdit(+this.dataset.idx,this.dataset.field,this.value)">`
      : `<span class="te-value">${esc(val)}</span>`;
  }
  const lockBtn = unlocked
    ? `<button class="te-lock-btn te-unlocked" onclick="lockTeamRow(${i})" title="Lock">&#128274;</button>`
    : `<button class="te-lock-btn" onclick="unlockTeamRow(${i})" title="Edit">&#9998;</button>`;

  return `<div style="display:flex;align-items:flex-start;gap:.6rem;">
    <div style="flex:1;">
      <div class="team-number">Tým ${i+1}</div>
      <div class="team-fields">
        <div><label>Název týmu</label>${field('tef_name_'+i, t.name, 'name')}</div>
        <div><label>Člen 1</label>${field('tef_p1_'+i,   t.p1,  'p1'  )}</div>
        <div><label>Člen 2</label>${field('tef_p2_'+i,   t.p2,  'p2'  )}</div>
      </div>
    </div>
    <div style="padding-top:1.6rem;">${lockBtn}</div>
  </div>`;
}

function unlockTeamRow(i) {
  if (!T()) return;
  const card = document.getElementById('tec_'+i);
  if (card) { card.innerHTML = teamEditorRowHTML(T().teams[i], i, true); document.getElementById('tef_name_'+i)?.focus(); }
}

function lockTeamRow(i) {
  if (!T()) return;
  ['name','p1','p2'].forEach(f => {
    const el = document.getElementById(`tef_${f}_${i}`);
    if (el) saveTeamEdit(i, f, el.value);
  });
  document.getElementById('tec_'+i)?.innerHTML !== undefined &&
    (document.getElementById('tec_'+i).innerHTML = teamEditorRowHTML(T().teams[i], i, false));
}

// ─────────────────────────────────────────────
//  EXPORT / IMPORT (per tournament)
// ─────────────────────────────────────────────
function slugify(s) {
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // strip diacritics
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'zavod';
}

function exportTournament(id, e) {
  if (e) e.stopPropagation();
  const t = tournaments.find(x => x.id === id);
  if (!t) return;

  // Record how many matches were done at this backup (for the staleness indicator)
  t.lastBackupDone = t.matches.filter(m => m.done).length;

  // timestamp: YYYY-MM-DD-HHMM
  const d = new Date();
  const ts = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;
  const filename = `${slugify(t.name)}-zaloha-${ts}.json`;

  const payload = {
    type: 'shootcomp-tournament',
    version: 1,
    exportedAt: d.toISOString(),
    tournament: t
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  saveAll();
  updateBackupIndicator();
}

// Soubojů completed since the last export of the active tournament
function matchesSinceBackup() {
  const t = T();
  if (!t) return 0;
  const done = t.matches.filter(m => m.done).length;
  const last = (typeof t.lastBackupDone === 'number') ? t.lastBackupDone : 0;
  return Math.max(0, done - last);
}

function updateBackupIndicator() {
  const el = document.getElementById('backupIndicator');
  if (!el) return;
  const t = T();
  if (!t) { el.style.display = 'none'; return; }
  el.style.display = '';

  const since = matchesSinceBackup();
  const everBacked = (typeof t.lastBackupDone === 'number');

  el.classList.remove('bi-ok', 'bi-warn', 'bi-stale');
  if (!everBacked) {
    el.textContent = 'Bez zálohy';
    el.classList.add('bi-warn');
  } else if (since === 0) {
    el.textContent = 'Zálohováno ✓';
    el.classList.add('bi-ok');
  } else if (since < 5) {
    el.textContent = `Záloha: před ${since} ${since === 1 ? 'soubojem' : 'souboji'}`;
    el.classList.add('bi-warn');
  } else {
    el.textContent = `⚠ Záloha: před ${since} souboji`;
    el.classList.add('bi-stale');
  }
}

function importTournamentFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    input.value = '';   // reset so the same file can be re-imported later
    let data;
    try { data = JSON.parse(reader.result); }
    catch { await confirmDialog('Soubor nelze přečíst (neplatný JSON).', 'OK'); return; }

    const t = data && data.tournament ? data.tournament
            : (data && data.id && data.teams ? data : null);
    if (!t || !t.id || !Array.isArray(t.teams) || !Array.isArray(t.matches)) {
      await confirmDialog('Tento soubor neobsahuje platný závod.', 'OK');
      return;
    }

    const existing = tournaments.find(x => x.id === t.id);
    if (existing) {
      const ok = await confirmDialog(`Závod „${t.name}" už existuje. Přepsat ho importovanými daty?`, 'Přepsat');
      if (!ok) return;
      Object.assign(existing, t);
    } else {
      tournaments.push(t);
    }
    activeTournamentId = t.id;
    renderTournamentCards();
    saveAll();
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────
//  PERSIST
// ─────────────────────────────────────────────
function save() { saveAll(); }

function saveAll() {
  try {
    localStorage.setItem('shootcomp_tournaments', JSON.stringify(tournaments));
    localStorage.setItem('shootcomp_active', activeTournamentId || '');
  } catch(e) {}
}

function loadSaved() {
  try {
    const raw = localStorage.getItem('shootcomp_tournaments');
    if (raw) {
      tournaments = JSON.parse(raw);
      activeTournamentId = localStorage.getItem('shootcomp_active') || null;
      return true;
    }
    // Migrate old single-tournament format
    const oldRaw = localStorage.getItem('shootcomp_state');
    if (oldRaw) {
      const old = JSON.parse(oldRaw);
      if (old.teams?.length) {
        const t = {id:newId(), name:old.tournamentName||'Tournament', date:old.tournamentDate||'', teams:old.teams, matches:old.matches||[], totalRounds:old.totalRounds||1, phase:old.phase||'matches'};
        tournaments = [t]; activeTournamentId = t.id;
        saveAll(); return true;
      }
    }
  } catch(e) {}
  return false;
}

// ─────────────────────────────────────────────
//  THEME
// ─────────────────────────────────────────────
function toggleTheme() {
  const light = document.body.classList.toggle('light');
  document.getElementById('themeIcon').textContent  = light ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = light ? 'Tmavý' : 'Světlý';
  try { localStorage.setItem('shootcomp_theme', light ? 'light' : 'dark'); } catch(e) {}
}

function loadTheme() {
  try {
    if (localStorage.getItem('shootcomp_theme') === 'dark') {
      document.body.classList.remove('light');
      document.getElementById('themeIcon').textContent  = '☀️';
      document.getElementById('themeLabel').textContent = 'Světlý';
    }
  } catch(e) {}
}

// ─────────────────────────────────────────────
//  CONFIRM MODAL
// ─────────────────────────────────────────────
function confirmDialog(message, okLabel = 'Smazat') {
  // okLabel 'OK' => single-button info dialog (no Cancel, neutral OK button)
  const alertOnly = okLabel === 'OK';
  return new Promise(resolve => {
    const overlay = document.getElementById('confirmModal');
    const msgEl   = document.getElementById('confirmModalMsg');
    const okBtn   = document.getElementById('confirmModalOk');
    const cancel  = document.getElementById('confirmModalCancel');
    msgEl.textContent = message;
    okBtn.textContent = okLabel;
    cancel.style.display = alertOnly ? 'none' : '';
    okBtn.classList.toggle('btn-danger', !alertOnly);
    okBtn.classList.toggle('btn-primary', alertOnly);
    overlay.classList.add('active');

    function cleanup(result) {
      overlay.classList.remove('active');
      okBtn.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      overlay.removeEventListener('click', onBackdrop);
      // restore default button styling
      okBtn.classList.remove('btn-primary'); okBtn.classList.add('btn-danger');
      cancel.style.display = '';
      resolve(result);
    }
    function onOk()       { cleanup(true); }
    function onCancel()   { cleanup(false); }
    function onBackdrop(e){ if (e.target === overlay) cleanup(alertOnly ? true : false); }

    okBtn.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
    overlay.addEventListener('click', onBackdrop);
  });
}

// ─────────────────────────────────────────────
//  SCORE INPUT FILTER (allow only a single digit 0–7)
// ─────────────────────────────────────────────
function filterScore(el) {
  // Keep only digits, take the last typed one, clamp to 0–7
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 1) v = v.slice(-1);        // single digit only
  if (v !== '' && parseInt(v) > 7) v = '7'; // clamp max
  el.value = v;
}

// ─────────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pad(n) { return String(n).padStart(2,'0'); }
function showAlert(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }
function hideAlert(id) { document.getElementById(id).classList.remove('show'); }
function updateHeaderPhase(txt) { document.getElementById('headerPhase').innerHTML=`<span class="dot"></span>${txt}`; }

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadTheme();
  loadSaved();
  renderTournamentCards();
  if (activeTournamentId && T()?.phase !== 'setup') {
    enableTabs(); updateHeaderPhase('Souboje'); switchTab('matches');
  }
});
</script>
